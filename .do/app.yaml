# DigitalOcean App Platform spec for clarity-production
# NOTE: Infrastructure is now managed by SST (sst.config.ts).
# This file is kept as a reference / fallback.
name: clarity-production
region: ams

services:
  - name: clarity-api
    github:
      repo: OxyHQ/Clarity
      branch: main
      deploy_on_push: true

    build_command: >-
      ELECTRON_SKIP_BINARY_DOWNLOAD=1 PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      bun run build:backend
    run_command: bun run start:backend
    source_dir: /
    environment_slug: node-js
    instance_size_slug: apps-s-2vcpu-4gb
    instance_count: 2

    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    http_port: 8080

    envs:
      - key: MONGODB_URI
        value: "${db-oxy.DATABASE_URL}"
      - key: CA_CERT
        value: "${db-oxy.CA_CERT}"
      - key: REDIS_URL
        value: "${db-valkey.DATABASE_URL}"
      - key: REDIS_CA_CERT
        value: "${db-valkey.CA_CERT}"
      - key: SERVICE_SECRET
        type: SECRET
      - key: WEB_URL
        value: "https://clarity.surf"
      # S3/Spaces
      - key: AWS_REGION
        value: "ams3"
      - key: AWS_ACCESS_KEY_ID
        type: SECRET
      - key: AWS_SECRET_ACCESS_KEY
        type: SECRET
      - key: AWS_ENDPOINT_URL
        value: "https://ams3.digitaloceanspaces.com"
      - key: AWS_S3_BUCKET
        value: "bucket-clarity"
      # Stripe
      - key: STRIPE_SECRET_KEY
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        type: SECRET
      # LiveKit
      - key: LIVEKIT_URL
        value: "wss://livekit.oxy.so"
      - key: LIVEKIT_API_KEY
        type: SECRET
      - key: LIVEKIT_API_SECRET
        type: SECRET
      - key: LIVEKIT_INTERNAL_URL
        value: "wss://livekit.oxy.so"

static_sites:
  - name: clarity-app
    github:
      repo: OxyHQ/Clarity
      branch: main
      deploy_on_push: true
    build_command: >-
      ELECTRON_SKIP_BINARY_DOWNLOAD=1 PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
      bun run build:frontend
    source_dir: /
    environment_slug: node-js
    output_dir: packages/frontend/dist
    catchall_document: index.html

databases:
  - name: db-oxy
    engine: MONGODB
    version: "8"
    production: true
    cluster_name: db-oxy
  - name: db-valkey
    engine: REDIS
    version: "7"
    production: true
    cluster_name: db-valkey-ams3-04785

domains:
  - domain: clarity.surf
    type: PRIMARY
    zone: clarity.surf
  - domain: api.clarity.surf
    type: ALIAS
    zone: clarity.surf

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
  - rule: DEPLOYMENT_LIVE
