name: Deploy Frontends

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-frontends.yml'
      - 'packages/**'
      - 'bun.lock'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.changes.outputs.app }}
      gateway-admin: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            app:
              - 'packages/**'
              - 'bun.lock'
            gateway-admin: []

  deploy-app:
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Build app
        run: bun run build:frontend
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
          NODE_OPTIONS: '--max-old-space-size=4096'
          NODE_ENV: production
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy packages/frontend/dist --project-name=clarity-app --branch=main

  deploy-gateway-admin:
    if: false
    runs-on: ubuntu-latest
    steps:
      - run: echo "gateway admin removed"
